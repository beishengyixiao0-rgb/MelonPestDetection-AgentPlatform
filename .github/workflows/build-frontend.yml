 # =============================================================
 # 构建前端 Docker 镜像 → GHCR，仅 frontend/ 有变更时触发
 # =============================================================
 name: Build Frontend Image
 
 on:
   push:
     branches: [main]
     paths:
       - "frontend/**"
       - "!frontend/.env"
       - "!frontend/node_modules/**"
 
 permissions:
   contents: read
   packages: write
 
 jobs:
   build:
     name: Build & Push Frontend
     runs-on: ubuntu-latest
     steps:
       - uses: actions/checkout@v4
 
       - name: Login to GitHub Container Registry
         uses: docker/login-action@v3
         with:
           registry: ghcr.io
           username: ${{ github.repository_owner }}
           password: ${{ secrets.GITHUB_TOKEN }}
 
       - name: Build and Push
         uses: docker/build-push-action@v6
         with:
           context: frontend
           file: frontend/Dockerfile
           push: true
           tags: |
             ghcr.io/${{ github.repository_owner }}/rsod-frontend:latest
             ghcr.io/${{ github.repository_owner }}/rsod-frontend:${{ github.sha }}
