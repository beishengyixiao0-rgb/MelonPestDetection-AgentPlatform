 # =============================================================
 # 部署到服务器 — build 成功后自动触发，SCP + SSH 部署
 # =============================================================
 name: Deploy to Server
 
 on:
   workflow_run:
     workflows:
       - "Build Frontend Image"
       - "Build Backend Image"
     types:
       - completed
   workflow_dispatch:
 
 jobs:
   deploy:
     name: Deploy
     runs-on: ubuntu-latest
     if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
     steps:
       - uses: actions/checkout@v4
 
       - name: SCP docker-compose.server.yml
         uses: appleboy/scp-action@v0.1.7
         with:
           host: ${{ secrets.SERVER_HOST }}
           username: ${{ secrets.SERVER_USERNAME }}
           password: ${{ secrets.SERVER_PASSWORD }}
           port: ${{ secrets.SERVER_PORT || '22' }}
           source: docker-compose.server.yml
           target: /opt/rsod-web-platform/
           strip_components: 0
 
       - name: SSH Deploy
         uses: appleboy/ssh-action@v1.2.1
         with:
           host: ${{ secrets.SERVER_HOST }}
           username: ${{ secrets.SERVER_USERNAME }}
           password: ${{ secrets.SERVER_PASSWORD }}
           port: ${{ secrets.SERVER_PORT || '22' }}
           script: |
             cd /opt/rsod-web-platform
             docker rmi ghcr.io/${{ github.repository_owner }}/rsod-frontend:latest || true
             docker rmi ghcr.io/${{ github.repository_owner }}/rsod-backend:latest || true
             docker compose -f docker-compose.server.yml pull
             docker compose -f docker-compose.server.yml up -d
             docker image prune -f
