 # =============================================================
 # CI 语法/构建检查 — push/PR 时始终执行
 # =============================================================
 name: CI Check
 
 on:
   push:
     branches: [main, develop]
   pull_request:
     branches: [main, develop]
 
 jobs:
   frontend-build:
     name: Frontend Build
     runs-on: ubuntu-latest
     defaults:
       run:
         working-directory: frontend
     steps:
       - uses: actions/checkout@v4
 
       - uses: actions/setup-node@v4
         with:
           node-version: 20
           cache: "npm"
           cache-dependency-path: frontend/package-lock.json
 
       - run: npm ci
       - run: npm run build
 
   backend-syntax:
     name: Backend Syntax
     runs-on: ubuntu-latest
     defaults:
       run:
         working-directory: backend
     steps:
       - uses: actions/checkout@v4
 
       - uses: actions/setup-python@v5
         with:
           python-version: "3.11"
 
       # 只检查语法，不安装依赖（避免 PyTorch 拖慢 CI）
       - run: python -m compileall -q .
