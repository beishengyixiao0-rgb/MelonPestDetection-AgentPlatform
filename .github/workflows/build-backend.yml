 # =============================================================
 # 构建后端 Docker 镜像 → GHCR，仅 backend/ 有变更时触发
 # =============================================================
 name: Build Backend Image
 
 on:
   push:
     branches: [main]
     paths:
       - "backend/**"
       - "!backend/.env"
       - "!backend/__pycache__/**"
       - "!backend/.venv/**"
 
 permissions:
   contents: read
   packages: write
 
 jobs:
   build:
     name: Build & Push Backend
     runs-on: ubuntu-latest
     steps:
       - uses: actions/checkout@v4
 
       - name: Login to GitHub Container Registry
         uses: docker/login-action@v3
         with:
           registry: ghcr.io
           username: ${{ github.repository_owner }}
           password: ${{ secrets.GITHUB_TOKEN }}
 
       - name: Build and Push
         uses: docker/build-push-action@v6
         with:
           context: backend
           file: backend/Dockerfile
           push: true
           tags: |
             ghcr.io/${{ github.repository_owner }}/rsod-backend:latest
             ghcr.io/${{ github.repository_owner }}/rsod-backend:${{ github.sha }}
