# ==============================================================================
# Alembic Database Migration Configuration File
# ==============================================================================
# Sections:
#    [alembic]         - Main config: script location, database connection
#    [post_write_hooks] - Post-generation hooks (e.g., formatters)
#    [loggers]         - Logging configuration


# ======================== Main Configuration ========================
[alembic]


# Directory containing migration scripts
script_location = alembic


# Template for migration file names
# Default format: {revision}_{slug}.py
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s


# Paths added to sys.path before executing migrations
prepend_sys_path = .


# Timezone for migration timestamps
# timezone =


# Maximum length of the "slug" field in migration filenames
# truncate_slug_length = 40


# Whether to run environment hooks during revision creation
# revision_environment = false


# Whether to use source-less migrations (.pyc/.pyo)
# sourceless = false


# Version file locations, supports multiple directories
# Default: alembic/versions
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions


# Version path separator, os means use OS default (Linux/macOS: :, Windows: ;)
version_path_separator = os


# Whether to recursively scan version directories for source files (Alembic 1.10+)
# recursive_version_locations = false


# Output encoding for generated migration files
output_encoding = utf-8


# ======================== Database Connection ========================
# Format: postgresql://username:password@host:port/database
sqlalchemy.url = postgresql://rsod_admin:rsod_admin@localhost:5432/rsod_agent


# ======================== Post Write Hooks ========================
# Hooks that run automatically after migration generation (e.g., formatters)
[post_write_hooks]


# Example: use black for formatting
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME


# Example: use ruff for linting
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME


# ======================== Logging Configuration ========================
[loggers]
# Logger names: root (default), sqlalchemy, alembic
keys = root,sqlalchemy,alembic


[handlers]
# Handler names: console (print to console)
keys = console


[formatters]
# Formatter names: generic (standard format)
keys = generic


# Root logger configuration
[logger_root]
level = WARN
handlers = console
qualname =


# SQLAlchemy logger configuration
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


# Alembic logger configuration
[logger_alembic]
level = INFO
handlers =
qualname = alembic


# Console handler configuration
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = DEBUG
formatter = generic


# Generic formatter configuration
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
