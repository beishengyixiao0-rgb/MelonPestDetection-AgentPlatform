 # =============================================================
 # 生产参考配置（可选）
 # 区别于 docker-compose.server.yml：
 #   - 显式设置资源限制
 #   - 日志轮转策略
 #   - 更安全的默认密码占位符
 # =============================================================
 name: rsod-platform-prod
 
 x-logging: &logging
   logging:
     driver: "json-file"
     options:
       max-size: "10m"
       max-file: "3"
 
 x-restart: &restart-policy
   restart: unless-stopped
 
 services:
   postgres:
     image: pgvector/pgvector:pg15
     container_name: rsod-postgres
     <<: [*restart-policy, *logging]
     environment:
       POSTGRES_DB: ${DB_NAME:-my_db}
       POSTGRES_USER: ${DB_USER:-my_user}
       POSTGRES_PASSWORD: ${DB_PASSWORD}
     volumes:
       - /data/postgres:/var/lib/postgresql/data
     deploy:
       resources:
         limits:
           memory: 512M
     healthcheck:
       test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-my_user} -d ${DB_NAME:-my_db}"]
       interval: 5s
       timeout: 5s
       retries: 5
 
   redis:
     image: redis:7-alpine
     container_name: rsod-redis
     <<: [*restart-policy, *logging]
     volumes:
       - /data/redis:/data
     deploy:
       resources:
         limits:
           memory: 256M
     healthcheck:
       test: ["CMD", "redis-cli", "ping"]
       interval: 5s
       timeout: 5s
       retries: 5
 
   minio:
     image: minio/minio:latest
     container_name: rsod-minio
     <<: [*restart-policy, *logging]
     environment:
       MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
       MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
     ports:
       - "9000:9000"
       - "9001:9001"
     volumes:
       - /data/minio:/data
     command: server /data --console-address ":9001"
     deploy:
       resources:
         limits:
           memory: 512M
     healthcheck:
       test: ["CMD-SHELL", "wget -qO- http://localhost:9000/minio/health/live"]
       interval: 10s
       timeout: 5s
       retries: 3
 
   backend:
     image: ghcr.io/${REPO_OWNER:-beishengyixiao0-rgb}/rsod-backend:latest
     container_name: rsod-backend
     <<: [*restart-policy, *logging]
     depends_on:
       postgres:
         condition: service_healthy
       minio:
         condition: service_healthy
       redis:
         condition: service_healthy
     env_file: /opt/rsod-web-platform/.env
     environment:
       DB_HOST: postgres
       DB_NAME: ${DB_NAME:-my_db}
       DB_USER: ${DB_USER:-my_user}
       DB_PASSWORD: ${DB_PASSWORD}
       DB_PORT: "5432"
       REDIS_HOST: redis
       REDIS_PORT: "6379"
       MINIO_ENDPOINT: minio:9000
       MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
       MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
       MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
       MINIO_BUCKET: rsod-images
       MINIO_SECURE: "false"
       APP_ENV: production
       DEBUG: "false"
       JWT_SECRET_KEY: ${JWT_SECRET_KEY}
     volumes:
       - /opt/rsod-web-platform/.rsod_platform:/app/.rsod_platform:ro
     ports:
       - "8000:8000"
     deploy:
       resources:
         limits:
           memory: 4G
 
   frontend:
     image: ghcr.io/${REPO_OWNER:-beishengyixiao0-rgb}/rsod-frontend:latest
     container_name: rsod-frontend
     <<: [*restart-policy, *logging]
     depends_on:
       - backend
     ports:
       - "80:80"
     deploy:
       resources:
         limits:
           memory: 128M
 
 networks:
   default:
     name: rsod-network
